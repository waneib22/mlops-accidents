services:

  api:
    build: .
    container_name: accidents_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src/models:/app/src/models
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
